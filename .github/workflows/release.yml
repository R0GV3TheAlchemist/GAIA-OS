name: 🚀 Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Release GAIA (Windows)
    runs-on: windows-latest

    steps:
      # 1. Full history so tauri-action can read the tag message
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Node.js
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Rust stable
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 4. Python 3.11 + sidecar
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller Pillow

      - name: Build gaia-backend sidecar (PyInstaller)
        run: pyinstaller gaia-backend.spec --clean
        shell: bash

      - name: Stage sidecar binary for Tauri
        run: |
          mkdir -p src-tauri/binaries
          cp dist/gaia-backend.exe \
             src-tauri/binaries/gaia-backend-x86_64-pc-windows-msvc.exe
        shell: bash

      # 5. Regenerate Windows icon assets (same fix as build workflows)
      - name: Regenerate icon assets
        shell: python
        run: |
          import os, struct
          from io import BytesIO
          from PIL import Image

          icons = "src-tauri/icons"
          src = Image.open(f"{icons}/Square150x150Logo.png").convert("RGBA")
          print(f"Source: {src.size} {src.mode}")

          def make_png(size):
              buf = BytesIO()
              src.resize((size, size), Image.LANCZOS).save(buf, format="PNG")
              return buf.getvalue()

          for filename, size in {
              "32x32.png": 32,
              "128x128.png": 128,
              "128x128@2x.png": 256,
              "icon.png": 512,
          }.items():
              data = make_png(size)
              open(f"{icons}/{filename}", "wb").write(data)
              print(f"  {filename}: {len(data)} bytes")

          ico_sizes = [16, 24, 32, 48, 64, 128, 256]
          frames = [make_png(s) for s in ico_sizes]
          n = len(ico_sizes)
          header = struct.pack("<HHH", 0, 1, n)
          entries = b""
          offset = 6 + 16 * n
          for s, f in zip(ico_sizes, frames):
              w = s if s < 256 else 0
              entries += struct.pack("<BBBBHHII", w, w, 0, 0, 1, 32, len(f), offset)
              offset += len(f)
          ico_path = f"{icons}/icon.ico"
          with open(ico_path, "wb") as out:
              out.write(header + entries)
              for f in frames:
                  out.write(f)
          sz = os.path.getsize(ico_path)
          print(f"icon.ico: {sz} bytes")
          assert sz > 10000, f"ICO too small: {sz}"

      # 6. Node deps
      - name: Install Node dependencies
        run: npm install

      # 7. Build + publish via tauri-action
      #    - Compiles the Tauri app (signed)
      #    - Creates a GitHub Release with installers attached
      #    - Auto-generates latest.json for the updater endpoint
      #    - Marks as pre-release if the tag contains a hyphen (e.g. v1.0.0-beta)
      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "GAIA ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/R0GV3TheAlchemist/GAIA-APP/blob/main/CHANGELOG.md)
            for full release notes.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          includeUpdaterJson: true
