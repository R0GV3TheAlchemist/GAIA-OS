name: GAIA Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Build the Python sidecar ──────────────────────────────────────────
  build-sidecar:
    name: Build Python Sidecar (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build gaia-backend.exe
        run: pyinstaller gaia-backend.spec

      # Tauri expects the sidecar binary named:
      # gaia-backend-x86_64-pc-windows-msvc.exe
      - name: Rename & stage sidecar
        run: |
          $triple = "x86_64-pc-windows-msvc"
          Copy-Item dist\gaia-backend.exe `
            src-tauri\binaries\gaia-backend-$triple.exe
        shell: pwsh

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: gaia-backend-sidecar
          path: src-tauri/binaries/gaia-backend-x86_64-pc-windows-msvc.exe

  # ── 2. Build the Tauri app ───────────────────────────────────────────────
  build-tauri:
    name: Build Tauri App (Windows)
    runs-on: windows-latest
    needs: build-sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Download sidecar
        uses: actions/download-artifact@v4
        with:
          name: gaia-backend-sidecar
          path: src-tauri/binaries/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: gaia-v__VERSION__
          releaseName: "GAIA v__VERSION__"
          releaseDraft: true
          prerelease: false
