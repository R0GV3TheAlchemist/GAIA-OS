name: GAIA Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Build the Python sidecar ──────────────────────────────────────────
  build-sidecar:
    name: Build Python Sidecar (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build gaia-backend.exe
        run: pyinstaller gaia-backend.spec

      - name: Rename & stage sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\binaries
          Copy-Item dist\gaia-backend.exe `
            src-tauri\binaries\gaia-backend-x86_64-pc-windows-msvc.exe

      - name: Verify sidecar exists
        shell: pwsh
        run: |
          $f = "src-tauri\binaries\gaia-backend-x86_64-pc-windows-msvc.exe"
          if (-not (Test-Path $f)) { throw "Sidecar not found: $f" }
          Write-Host "Sidecar OK: $((Get-Item $f).Length) bytes"

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: gaia-backend-sidecar
          path: src-tauri/binaries/gaia-backend-x86_64-pc-windows-msvc.exe

  # ── 2. Build the Tauri app ───────────────────────────────────────────────
  build-tauri:
    name: Build Tauri App (Windows)
    runs-on: windows-latest
    needs: build-sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build

      - name: Download sidecar into binaries/
        uses: actions/download-artifact@v4
        with:
          name: gaia-backend-sidecar
          path: src-tauri/binaries

      - name: Verify sidecar present before Rust compile
        shell: pwsh
        run: |
          $f = "src-tauri\binaries\gaia-backend-x86_64-pc-windows-msvc.exe"
          if (-not (Test-Path $f)) { throw "Sidecar missing: $f" }
          Write-Host "Sidecar confirmed: $((Get-Item $f).Length) bytes"

      - name: Install Pillow
        run: pip install Pillow

      # Pillow's append_images ICO API is broken on Windows (writes 583 bytes).
      # Build the ICO file manually using the raw ICO binary format spec.
      - name: Build icon.ico manually
        shell: python
        run: |
          import os, struct
          from io import BytesIO
          from PIL import Image

          icons = "src-tauri/icons"
          ico_sizes = [16, 24, 32, 48, 64, 128, 256]

          # Load source and render each size as raw PNG bytes
          src = Image.open(f"{icons}/Square150x150Logo.png").convert("RGBA")
          print(f"Source: {src.size} {src.mode}")

          png_frames = []
          for s in ico_sizes:
              buf = BytesIO()
              frame = src.resize((s, s), Image.LANCZOS)
              frame.save(buf, format="PNG")
              png_frames.append(buf.getvalue())
              print(f"  PNG {s}x{s}: {len(buf.getvalue())} bytes")

          # Build ICO binary manually per spec:
          # Header: 6 bytes
          # Directory: 16 bytes * n_images
          # Image data: concatenated PNG blobs
          n = len(ico_sizes)
          header = struct.pack("<HHH", 0, 1, n)  # reserved, type=1 (ICO), count

          # Calculate offsets: header(6) + directory(16*n) + sum of prior blobs
          dir_entries = b""
          data_offset = 6 + 16 * n
          for i, (s, png) in enumerate(zip(ico_sizes, png_frames)):
              w = s if s < 256 else 0   # 256 stored as 0 per spec
              h = s if s < 256 else 0
              dir_entries += struct.pack(
                  "<BBBBHHII",
                  w, h,        # width, height
                  0,           # color count (0 = no palette)
                  0,           # reserved
                  1,           # color planes
                  32,          # bits per pixel
                  len(png),    # size of image data
                  data_offset, # offset to image data
              )
              data_offset += len(png)

          ico_path = f"{icons}/icon.ico"
          with open(ico_path, "wb") as f:
              f.write(header + dir_entries)
              for png in png_frames:
                  f.write(png)

          size = os.path.getsize(ico_path)
          print(f"icon.ico written: {size} bytes")
          assert size > 10_000, f"ICO too small ({size} bytes)"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: gaia-v__VERSION__
          releaseName: "GAIA v__VERSION__"
          releaseDraft: true
          prerelease: false
