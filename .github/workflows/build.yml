name: GAIA Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Build the Python sidecar ──────────────────────────────────────────
  build-sidecar:
    name: Build Python Sidecar (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build gaia-backend.exe
        run: pyinstaller gaia-backend.spec

      - name: Rename & stage sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\binaries
          Copy-Item dist\gaia-backend.exe `
            src-tauri\binaries\gaia-backend-x86_64-pc-windows-msvc.exe

      - name: Verify sidecar exists
        shell: pwsh
        run: |
          $f = "src-tauri\binaries\gaia-backend-x86_64-pc-windows-msvc.exe"
          if (-not (Test-Path $f)) { throw "Sidecar not found: $f" }
          Write-Host "Sidecar OK: $((Get-Item $f).Length) bytes"

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: gaia-backend-sidecar
          path: src-tauri/binaries/gaia-backend-x86_64-pc-windows-msvc.exe

  # ── 2. Build the Tauri app ───────────────────────────────────────────────
  build-tauri:
    name: Build Tauri App (Windows)
    runs-on: windows-latest
    needs: build-sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build

      - name: Download sidecar into binaries/
        uses: actions/download-artifact@v4
        with:
          name: gaia-backend-sidecar
          path: src-tauri/binaries

      - name: Verify sidecar present before Rust compile
        shell: pwsh
        run: |
          $f = "src-tauri\binaries\gaia-backend-x86_64-pc-windows-msvc.exe"
          if (-not (Test-Path $f)) { throw "Sidecar missing: $f" }
          Write-Host "Sidecar confirmed: $((Get-Item $f).Length) bytes"

      - name: Install Pillow
        run: pip install Pillow

      # Regenerate ALL stub PNGs and icon.ico from Square150x150Logo.png
      # (the only confirmed valid source image at 17 KB).
      # Tauri codegen reads 32x32.png and 128x128.png at compile time.
      - name: Regenerate icons
        shell: python
        run: |
          import os, struct
          from io import BytesIO
          from PIL import Image

          icons = "src-tauri/icons"
          src = Image.open(f"{icons}/Square150x150Logo.png").convert("RGBA")
          print(f"Source: {src.size} {src.mode}")

          def make_png(size):
              buf = BytesIO()
              src.resize((size, size), Image.LANCZOS).save(buf, format="PNG")
              return buf.getvalue()

          # Overwrite every stub PNG that Tauri codegen or winres references
          replacements = {
              "32x32.png":      32,
              "128x128.png":    128,
              "128x128@2x.png": 256,
              "icon.png":       512,
          }
          for filename, size in replacements.items():
              data = make_png(size)
              with open(f"{icons}/{filename}", "wb") as f:
                  f.write(data)
              print(f"  {filename}: {len(data)} bytes")

          # Build ICO manually (Pillow append_images is broken on Windows)
          ico_sizes = [16, 24, 32, 48, 64, 128, 256]
          png_frames = [make_png(s) for s in ico_sizes]

          n = len(ico_sizes)
          header = struct.pack("<HHH", 0, 1, n)
          dir_entries = b""
          data_offset = 6 + 16 * n
          for s, png in zip(ico_sizes, png_frames):
              w = s if s < 256 else 0
              h = s if s < 256 else 0
              dir_entries += struct.pack(
                  "<BBBBHHII",
                  w, h, 0, 0, 1, 32,
                  len(png), data_offset,
              )
              data_offset += len(png)

          ico_path = f"{icons}/icon.ico"
          with open(ico_path, "wb") as f:
              f.write(header + dir_entries)
              for png in png_frames:
                  f.write(png)

          size = os.path.getsize(ico_path)
          print(f"icon.ico: {size} bytes")
          assert size > 10_000, f"ICO too small: {size} bytes"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: gaia-v__VERSION__
          releaseName: "GAIA v__VERSION__"
          releaseDraft: true
          prerelease: false
