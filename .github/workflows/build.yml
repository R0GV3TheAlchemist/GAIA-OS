# .github/workflows/build.yml
# GAIA-APP Cross-Platform Build + Python Core Verification
#
# Runs on every push and pull request to main.
# build-desktop: Tauri desktop build matrix (Linux / Windows / macOS)
# test-python-core: Strict Python test suite (no continue-on-error)

name: GAIA-APP Cross-Platform Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node dependencies
        run: npm ci

      - name: Build TypeScript frontend
        run: npx vite build

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gaia-app-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/
          retention-days: 7

  test-python-core:
    name: Test Python Constitutional Core
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run test suite
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=core \
            --cov-report=term-missing \
            -p no:warnings
