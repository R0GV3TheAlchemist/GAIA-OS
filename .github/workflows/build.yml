name: GAIA Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Build the Python sidecar ──────────────────────────────────────────
  build-sidecar:
    name: Build Python Sidecar (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build gaia-backend.exe
        run: pyinstaller gaia-backend.spec

      - name: Stage sidecar with correct triple name
        shell: pwsh
        run: |
          $dest = "src-tauri\binaries\gaia-backend-x86_64-pc-windows-msvc.exe"
          Copy-Item dist\gaia-backend.exe $dest -Force
          Write-Host "Sidecar staged: $((Get-Item $dest).Length) bytes"

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: gaia-backend-sidecar
          path: src-tauri/binaries/gaia-backend-x86_64-pc-windows-msvc.exe

  # ── 2. Build the Tauri app ───────────────────────────────────────────────
  build-tauri:
    name: Build Tauri App (Windows)
    runs-on: windows-latest
    needs: build-sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build

      # Download real sidecar and overwrite the committed stub
      - name: Download & overwrite sidecar
        uses: actions/download-artifact@v4
        with:
          name: gaia-backend-sidecar
          path: src-tauri/binaries/

      - name: Verify sidecar
        shell: pwsh
        run: |
          $f = "src-tauri\binaries\gaia-backend-x86_64-pc-windows-msvc.exe"
          if (-not (Test-Path $f)) {
            Get-ChildItem src-tauri\binaries\
            throw "Sidecar missing: $f"
          }
          $size = (Get-Item $f).Length
          if ($size -lt 100000) { throw "Sidecar looks like a stub ($size bytes)" }
          Write-Host "Sidecar OK: $size bytes"

      - name: Install Pillow
        run: pip install Pillow

      - name: Regenerate icons
        shell: python
        run: |
          import os, struct
          from io import BytesIO
          from PIL import Image

          icons = "src-tauri/icons"
          src = Image.open(f"{icons}/Square150x150Logo.png").convert("RGBA")
          print(f"Source: {src.size} {src.mode}")

          def make_png(size):
              buf = BytesIO()
              src.resize((size, size), Image.LANCZOS).save(buf, format="PNG")
              return buf.getvalue()

          for filename, size in {
              "32x32.png": 32,
              "128x128.png": 128,
              "128x128@2x.png": 256,
              "icon.png": 512,
          }.items():
              data = make_png(size)
              open(f"{icons}/{filename}", "wb").write(data)
              print(f"  {filename}: {len(data)} bytes")

          ico_sizes = [16, 24, 32, 48, 64, 128, 256]
          frames = [make_png(s) for s in ico_sizes]
          n = len(ico_sizes)
          header = struct.pack("<HHH", 0, 1, n)
          entries = b""
          offset = 6 + 16 * n
          for s, f in zip(ico_sizes, frames):
              w = s if s < 256 else 0
              entries += struct.pack("<BBBBHHII", w, w, 0, 0, 1, 32, len(f), offset)
              offset += len(f)
          ico_path = f"{icons}/icon.ico"
          with open(ico_path, "wb") as out:
              out.write(header + entries)
              for f in frames: out.write(f)
          sz = os.path.getsize(ico_path)
          print(f"icon.ico: {sz} bytes")
          assert sz > 10_000, f"ICO too small: {sz}"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: gaia-v__VERSION__
          releaseName: "GAIA v__VERSION__"
          releaseDraft: true
          prerelease: false
