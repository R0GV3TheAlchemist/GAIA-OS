name: Build Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target

jobs:
  build-windows:
    name: Build GAIA Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          if (Test-Path requirements.txt) {
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          } else {
            Write-Host "No requirements.txt found, skipping."
          }
        shell: pwsh

      - name: Install Node dependencies
        run: npm ci

      - name: Generate icons from SVG source
        run: npx @tauri-apps/cli icon src-tauri/icons/gaia-icon.svg

      - name: Build TypeScript frontend
        run: npx vite build

      - name: Verify dist output
        run: |
          if (Test-Path dist) {
            Write-Host "dist/ exists - OK"
            Get-ChildItem dist
          } else {
            Write-Error "dist/ not found after vite build!"
            exit 1
          }
        shell: pwsh

      - name: Build GAIA Windows installer
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload MSI installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: GAIA-Windows-MSI
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 30

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: GAIA-Windows-NSIS
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30
